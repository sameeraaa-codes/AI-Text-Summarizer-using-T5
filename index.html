<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFF7ED;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 650px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #FB923C;
        }

        h3 {
            text-align: center;
            margin-top: 0;
            color: #444;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #FB923C;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #F97316;
        }

        button:disabled {
            background-color: #fbbf24;
            cursor: not-allowed;
        }

        .label {
            margin-top: 20px;
            font-weight: bold;
        }

        #summary-box {
            margin-top: 10px;
            padding: 15px;
            background: #FFEDD5;
            border-radius: 6px;
            min-height: 60px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI Text Summarizer</h1>
    <h3>Powered by HuggingFace T5 Model</h3>

    <form id="summarization-form">
        <textarea id="dialogue-input" placeholder="Enter your text here..." required></textarea>
        <button type="submit" id="submit-btn">Summarize</button>
    </form>

    <div class="label">Summary:</div>
    <div id="summary-box">Your summary will appear here...</div>
</div>

<script>
const form = document.getElementById("summarization-form");
const textarea = document.getElementById("dialogue-input");
const summaryBox = document.getElementById("summary-box");
const button = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = textarea.value.trim();
    if (!text) return;

    summaryBox.innerText = "Processing...";
    button.disabled = true;

    try {
        const response = await fetch("http://127.0.0.1:8000/summarize/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ dialogue: text })
        });

        if (!response.ok) {
            throw new Error("Server Error: " + response.status);
        }

        const data = await response.json();
        summaryBox.innerText = data.summary || "No summary generated.";

    } catch (error) {
        summaryBox.innerText = "Error: " + error.message;
    } finally {
        button.disabled = false;
    }
});
</script>

</body>
</html>
